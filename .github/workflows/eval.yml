name: ISACA SD Advisor — Weekly Eval

on:
  schedule:
    - cron: '0 9 * * 1'   # 9:00 AM UTC every Monday
  workflow_dispatch: {}    # allow manual trigger from the Actions tab

jobs:
  eval:
    name: Run eval suite
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run eval suite
        run: python main.py eval --verbose --min-pass-rate 0.90
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: claude-sonnet-4-6

      - name: Upload results
        if: always()   # upload even if the eval fails, so we can inspect the output
        uses: actions/upload-artifact@v4
        with:
          name: eval-results-${{ github.run_id }}
          path: isaca_sd/evals/results/
          retention-days: 90
